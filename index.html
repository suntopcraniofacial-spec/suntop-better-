html<div class="form-group">
    <label for="treatment">Select Dental / Craniofacial Treatment:</label>
    <select id="treatment" required>
        <!-- EMERGENCY BLOCK -->
        <optgroup label="🚨 Urgent Assistance">
            <option value="Emergency Dental Treatment">Emergency Dental Treatment</option>
        </optgroup>

        <optgroup label="General & Preventive Care">
            <option value="Scaling and Polishing">Scaling & Polishing</option>
            <option value="Mouth Odour Treatment">Mouth Odour Treatment</option>
            <option value="Teeth Whitening">Teeth Whitening</option>
        </optgroup>
        
        <optgroup label="Surgical Extractions">
            <option value="Simple Extraction">Simple Extraction</option>
            <option value="Routine Extraction">Routine Extraction</option>
            <option value="Wisdom Tooth Extraction">Wisdom Tooth Care</option>
        </optgroup>
        
        <optgroup label="Restorations & Orthodontics">
            <option value="GIC Filling">GIC Filling</option>
            <option value="Composite Filling">Composite Restoration</option>
            <option value="Amalgam Filling">Amalgam Filling</option>
            <option value="Crowns">Crowns (General)</option>
            <option value="Acrylic Crowns">Acrylic Crowns</option>
            <option value="Post and Core">Post and Core Treatment</option>
            <option value="Root Canal Therapy (RCT)">Root Canal Therapy (RCT)</option>
            <option value="Orthodontic Braces">Orthodontic Braces (Braces 2)</option>
        </optgroup>
        
        <optgroup label="Prosthodontics & Crowns">
            <option value="Zirconia Crown">Zirconia Crown</option>
            <option value="PFM Crown 1">PFM Crown Type 1</option>
            <option value="PFM Crown 2">PFM Crown Type 2</option>
            <option value="Dental Bridge 1">Dental Bridge Variant 1</option>
            <option value="Dental Bridge 2">Dental Bridge Variant 2</option>
            <option value="Denture Restoration">Denture Therapy</option>
            <option value="Dental Implant">Dental Implant Surgery</option>
        </optgroup>
        
        <optgroup label="Advanced Craniofacial & Maxillofacial Surgery">
            <option value="Parotidectomy">Parotidectomy Surgery</option>
            <option value="TMJ Surgery">TMJ Surgery Procedure</option>
            <option value="Maxillectomy">Maxillectomy Procedure</option>
            <option value="Mandibulectomy">Mandibulectomy Procedure</option>
            <option value="Cleft Lip Repair">Cleft Lip Reconstructive Surgery</option>
            <option value="Cleft Palate Repair">Cleft Palate Reconstructive Surgery</option>
            <option value="Face Reconstruction">Advanced Face Reconstruction</option>
            <option value="Face Esthetic Surgery">Face Esthetic Aesthetic Surgery</option>
            <option value="Lip Augmentation">Lip Augmentation Treatment</option>
            <option value="Keloid Treatment">Advanced Keloid Removal</option>
        </optgroup>

        <!-- GENERAL MISCELLANEOUS OPTION -->
        <optgroup label="Other Concerns">
            <option value="Other Treatment Requirement">Other (Please discuss with Consultant)</option>
        </optgroup>
    </select>
</div>
